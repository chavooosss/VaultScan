<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultScan — Geçmiş</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.11/dist/purify.min.js" integrity="sha384-o44XUELLEnv/iSlA1NWxBweqbD4TSR0qgq2VzVsxtkHS989JJjGKSE9vkfo5MN4K" crossorigin="anonymous"></script>
  <script src="/static/render-result.js"></script>
</head>
<body class="settings-body">
  <div class="container settings-container">
    <div class="user-bar" id="userBar">
      <img id="userAvatar" class="user-avatar" src="" alt="" style="display:none">
      <span id="userName" class="user-name"></span>
      <a href="/gizlilik" class="logout-link">Gizlilik</a>
      <a href="/auth/logout" class="logout-link">Çıkış</a>
    </div>

    <div class="header">
      <span class="eyebrow"><span class="dot"></span>Geçmiş</span>
      <h1>Analiz Geçmişin</h1>
      <p>Daha önce yaptığın analizlerin raporları — kod/dosya/repo içeriği saklanmaz, sadece AI'nin ürettiği rapor.</p>
    </div>

    <a href="/" class="back-link" id="mainBackLink">← Analiz sayfasına dön</a>

    <div id="historyList" class="history-list">
      <p class="muted">Yükleniyor...</p>
    </div>

    <div id="historyDetail" class="history-detail" style="display:none">
      <button id="historyDetailBack" class="back-link">← Listeye dön</button>
      <div id="historyDetailResult" class="result"></div>
    </div>
  </div>
  <script src="/static/history.js"></script>
</body>
</html>
