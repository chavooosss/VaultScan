<body class="login-body">
  <button id="langToggle" class="logout-link" onclick="toggleLang()" aria-label="Switch language" style="position:absolute;top:16px;right:16px">EN</button>
  <div class="login-card">
    <span class="eyebrow"><span class="dot"></span><span data-i18n="eyebrow_tool">Güvenlik Analiz Aracı</span></span>
    <h1>VaultScan</h1>
    <p data-i18n="login_subtitle">Devam etmek için Google hesabınla giriş yap.</p>
    <p id="loginError" class="error-text" style="display:none" data-i18n="login_error">Giriş başarısız oldu, lütfen tekrar deneyin.</p>
    <a class="google-btn" href="/auth/google/login">
      <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.9-2.26c-.8.55-1.84.86-3.06.86-2.36 0-4.36-1.6-5.07-3.75H.9v2.33A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.93 10.67A5.4 5.4 0 0 1 3.64 9c0-.58.1-1.15.29-1.67V4.99H.9A9 9 0 0 0 0 9c0 1.45.35 2.83.9 4.01l3.03-2.34z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.57-2.57A8.9 8.9 0 0 0 9 0 9 9 0 0 0 .9 4.99l3.03 2.34C4.64 5.18 6.64 3.58 9 3.58z"/>
      </svg>
      <span data-i18n="login_with_google">Google ile Giriş Yap</span>
    </a>
    <p style="margin-top:14px;"><a href="/demo" class="back-link" data-i18n="login_try_demo">Önce bir demo görmek ister misin? →</a></p>
    <p style="margin-top:8px;"><a href="/gizlilik" class="back-link" data-i18n="login_privacy_link">Verilerinle ne yapıyoruz?</a></p>
  </div>
  <a href="https://shipin.city/shipped" target="_blank" rel="noopener" class="shipin-badge">
    <img src="/static/shipin-logo.png" alt="Shipin">
    <span>Veli Ercan · Powered by Shipin</span>
  </a>
  <script>
    if (new URLSearchParams(window.location.search).get('login_error')) {
      document.getElementById('loginError').style.display = 'block';
    }
  </script>
</body>
</html>
